# SPDX-License-Identifier: Apache-2.0
name: UAT (clean install)

# Agentic UAT for the harness: build the wheel, CLEAN-install it into a fresh
# venv (NOT editable), and run a real `eldermind` CLI user journey on Windows,
# macOS, and Linux. This exercises the packaged console entry-point and on-disk
# file I/O the way a real user gets it — catching packaging / entry-point /
# encoding issues the editable-install regression CI (ci.yml) structurally cannot
# see. Dispatch-triggered (on demand) to control macOS (10x) / Windows (2x) billing.

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash   # Git Bash on Windows → steps are OS-uniform

jobs:
  uat:
    name: "UAT — clean install + CLI journey (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the wheel + clean-install it into a fresh venv (the user's real path)
        run: |
          python -m pip install --quiet build
          python -m build --wheel
          python -m venv uatenv
          if [ -d uatenv/Scripts ]; then VBIN="$(pwd)/uatenv/Scripts"; else VBIN="$(pwd)/uatenv/bin"; fi
          "$VBIN/python" -m pip install --quiet --upgrade pip
          "$VBIN/pip" install --quiet "$(ls dist/*.whl)"
          echo "$VBIN" >> "$GITHUB_PATH"   # put the installed `eldermind` console script on PATH

      - name: UAT — real CLI user journey
        run: |
          set -e
          echo "::group::eldermind version"
          eldermind version | tee ver.txt | grep -q "0.1.0"
          echo "::endgroup::"

          work=$(mktemp -d); cd "$work"

          echo "::group::install into claude-code (writes .claude/ + .eldermind/)"
          eldermind install claude-code
          test -f .claude/settings.json
          test -f .eldermind/policy.yaml
          echo "::endgroup::"

          echo "::group::install into cursor (exercises the UTF-8 .cursor/rules write)"
          eldermind install cursor
          test -f .cursor/rules/eldermind.mdc
          echo "::endgroup::"

          echo "::group::a dangerous command must BLOCK (exit 2)"
          set +e
          printf '%s' '{"action":"bash","target":"rm -rf /"}' | eldermind check > out.json
          rc=$?
          set -e
          cat out.json
          test "$rc" -eq 2
          grep -q '"verdict": "block"' out.json
          grep -q '"asi": "ASI02"' out.json
          echo "::endgroup::"

          echo "::group::audit hash-chain intact"
          eldermind verify
          echo "::endgroup::"

          echo "UAT journey passed on ${{ matrix.os }}"

      - name: Upload UAT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uat-${{ matrix.os }}
          path: |
            ver.txt
          retention-days: 7
          if-no-files-found: ignore
