name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Use bash on every runner (Git Bash on Windows) so steps are OS-uniform.
defaults:
  run:
    shell: bash

jobs:
  # ---- Regression: full unit + integration suite, on Mac / Windows / Linux ----
  regression:
    name: Regression (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (with mcp + dev extras)
        run: pip install -e ".[mcp,dev]"
      - name: Unit + integration tests
        run: python -m pytest tests/ -q --ignore=tests/test_journeys.py

  # ---- UAT: persona user-journeys, on Mac / Windows / Linux ----
  user-journeys:
    name: UAT user-journeys (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[mcp,dev]"
      - name: Persona journeys (technical / knowledge-worker / back-office) + CLI E2E
        run: python -m pytest tests/test_journeys.py -v

  # ---- Offline determinism (logic-only, fastest runner) ----
  offline-determinism:
    name: Offline determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Gate is deterministic + offline
        run: |
          a=$(echo '{"action":"bash","target":"git push --force origin main"}' | python -m eldermind.cli check --no-audit)
          b=$(echo '{"action":"bash","target":"git push --force origin main"}' | python -m eldermind.cli check --no-audit)
          test "$a" = "$b" || { echo "::error::non-deterministic gate output"; exit 1; }
          echo "$a" | python -c "import sys,json; d=json.load(sys.stdin); assert d['verdict']=='block', d; assert d['asi']=='ASI02', d"
          echo "deterministic + correct"

  # ---- Honesty audit (no overclaims; correct OWASP-2026 taxonomy) ----
  honesty:
    name: Honesty audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No forbidden claims; correct taxonomy; threat model present
        run: |
          set -e
          if grep -rniE "(NIST|OWASP)[ -]*(compliant|certified)|covers all (10|ten)|blocks? (all )?prompt injection|AI[- ]powered" \
               README.md docs/ THREAT_MODEL.md CHANGELOG.md \
             | grep -viE "not .*(compliant|certified|ai.?powered)|never|isn't|aware|aligned|reduce malicious"; then
            echo "::error::forbidden overclaim found"; exit 1
          fi
          if grep -rniE "ASI09.*Improper Error Handling|ASI10.*Unbounded Consumption" docs/ ; then
            echo "::error::stale OWASP ASI taxonomy"; exit 1
          fi
          test -f THREAT_MODEL.md
          grep -qiE "does NOT do|out of scope" README.md
          echo "honesty audit passed"

  # ---- Branded collateral: PDFs regenerate cleanly + stay byte-stable ----
  docs-pdf:
    name: Branded PDFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[pdf]"
      - name: Generate + check byte-stability (committed PDFs are up to date)
        run: |
          python tools/build_pdfs.py
          for f in docs/pdf/Elder-Mind-Overview.pdf docs/pdf/Elder-Mind-User-Guide.pdf docs/pdf/Elder-Mind-Quickstart.pdf; do
            test -s "$f" || { echo "::error::$f missing/empty"; exit 1; }
          done
          if ! git diff --quiet -- docs/pdf; then
            echo "::error::committed PDFs are stale — run 'python tools/build_pdfs.py' and commit"; exit 1
          fi
          echo "branded PDFs present, non-empty, and up to date"
      - uses: actions/upload-artifact@v4
        with:
          name: elder-mind-collateral
          path: docs/pdf/*.pdf

  # ---- Build wheel + assert bundled data ----
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --wheel
      - name: policy.yaml + blocklist.json bundled
        run: |
          python - <<'PY'
          import glob, zipfile
          n = zipfile.ZipFile(sorted(glob.glob("dist/*.whl"))[-1]).namelist()
          assert "eldermind/policy.yaml" in n, "policy.yaml not bundled"
          assert "eldermind/blocklist.json" in n, "blocklist.json not bundled"
          print("bundled data OK")
          PY
