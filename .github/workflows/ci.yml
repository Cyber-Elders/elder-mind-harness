name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # run the full cross-OS matrix on demand

permissions:
  contents: read

# Bash on every runner (Git Bash on Windows) so steps are OS-uniform.
defaults:
  run:
    shell: bash

jobs:
  # ---- Regression: full suite on Ubuntu × all supported Pythons (cheap, 1×) ----
  regression:
    name: Regression (ubuntu · py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[mcp,dev]"
      - name: Full suite (unit + integration + UAT journeys + doc-as-test + QA guard)
        run: python -m pytest tests/ -q

  # ---- Cross-OS: the same suite on macOS + Windows, ONE Python.
  #      Gated to main-pushes / manual dispatch — macOS bills 10×, Windows 2×,
  #      so we don't burn the free budget on every PR. ----
  cross-os:
    name: Cross-OS (${{ matrix.os }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[mcp,dev]"
      - name: Full suite incl. persona UAT + Windows/path coverage
        run: python -m pytest tests/ -q

  # ---- Offline determinism (logic-only) ----
  offline-determinism:
    name: Offline determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Gate is deterministic + offline
        run: |
          # `check` exits 2 on a block (by design) — `|| true` keeps bash -e from aborting.
          a=$(echo '{"action":"bash","target":"git push --force origin main"}' | python -m eldermind.cli check --no-audit || true)
          b=$(echo '{"action":"bash","target":"git push --force origin main"}' | python -m eldermind.cli check --no-audit || true)
          test "$a" = "$b" || { echo "::error::non-deterministic gate output"; exit 1; }
          echo "$a" | python -c "import sys,json; d=json.load(sys.stdin); assert d['verdict']=='block', d; assert d['asi']=='ASI02', d"
          echo "deterministic + correct"

  # ---- Honesty audit (no overclaims; correct OWASP-2026 taxonomy) ----
  honesty:
    name: Honesty audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No forbidden claims; correct taxonomy; threat model present
        run: |
          set -e
          if grep -rniE "(NIST|OWASP)[ -]*(compliant|certified)|covers all (10|ten)|blocks? (all )?prompt injection|AI[- ]powered" \
               README.md docs/ THREAT_MODEL.md CHANGELOG.md START-HERE.md \
             | grep -viE "not .*(compliant|certified|ai.?powered)|never|isn't|aware|aligned|reduce malicious|overclaim|forbidden|not a prompt"; then
            echo "::error::forbidden overclaim found"; exit 1
          fi
          if grep -rniE "ASI09.*Improper Error Handling|ASI10.*Unbounded Consumption" docs/ ; then
            echo "::error::stale OWASP ASI taxonomy"; exit 1
          fi
          test -f THREAT_MODEL.md
          grep -qiE "does NOT do|out of scope" README.md
          echo "honesty audit passed"

  # ---- Build wheel + assert bundled data ----
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --wheel
      - name: policy.yaml + blocklist.json bundled
        run: |
          python - <<'PY'
          import glob, zipfile
          n = zipfile.ZipFile(sorted(glob.glob("dist/*.whl"))[-1]).namelist()
          assert "eldermind/policy.yaml" in n, "policy.yaml not bundled"
          assert "eldermind/blocklist.json" in n, "blocklist.json not bundled"
          print("bundled data OK")
          PY

  # ---- Self supply-chain audit: a supply-chain tool must scan its own deps ----
  self-audit:
    name: Self supply-chain audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . pip-audit
      - name: Audit our own dependency tree (OSV/PyPI advisories)
        # Our runtime dep surface is tiny (pyyaml). pip-audit skips the local
        # editable package; it fails the build on any known-vulnerable dependency.
        run: pip-audit --desc

  # ---- Branded collateral: PDFs byte-stable + demo regenerates ----
  docs-collateral:
    name: Branded collateral
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[pdf,demo]"
      - name: PDFs — generate + byte-stability (committed copies up to date)
        run: |
          python tools/build_pdfs.py
          for f in docs/pdf/Elder-Mind-Overview.pdf docs/pdf/Elder-Mind-User-Guide.pdf docs/pdf/Elder-Mind-Quickstart.pdf; do
            test -s "$f" || { echo "::error::$f missing/empty"; exit 1; }
          done
          if ! git diff --quiet -- docs/pdf; then
            echo "::error::committed PDFs are stale — run 'python tools/build_pdfs.py' and commit"; exit 1
          fi
      - name: Demo GIF — regenerates non-empty (fonts differ per OS, no byte check)
        run: |
          python tools/build_demo.py
          test -s docs/assets/demo-block.gif || { echo "::error::demo GIF missing/empty"; exit 1; }
          test -s docs/assets/demo-block.png || { echo "::error::demo PNG missing/empty"; exit 1; }
      - uses: actions/upload-artifact@v7
        with:
          name: elder-mind-collateral
          path: |
            docs/pdf/*.pdf
            docs/assets/demo-block.*
