<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="maturity-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="33%" style="stop-color:#3b82f6"/>
      <stop offset="66%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>

  <!-- Shield mark -->
  <g transform="translate(16, 10)">
    <!-- Outer shield shape -->
    <path d="M40 4 L72 16 L72 52 C72 72 56 88 40 96 C24 88 8 72 8 52 L8 16 Z"
          fill="url(#shield-fill)" stroke="none"/>
    <!-- Inner shield highlight -->
    <path d="M40 12 L64 22 L64 50 C64 66 52 78 40 84 C28 78 16 66 16 50 L16 22 Z"
          fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <!-- Maturity layers inside shield (4 horizontal bars) -->
    <rect x="24" y="30" width="32" height="4" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="22" y="38" width="36" height="4" rx="2" fill="#3b82f6" opacity="0.9"/>
    <rect x="20" y="46" width="40" height="4" rx="2" fill="#f97316" opacity="0.9"/>
    <rect x="18" y="54" width="44" height="4" rx="2" fill="#a855f7" opacity="0.9"/>
    <!-- Upward arrow/chevron representing governance -->
    <path d="M40 20 L48 28 L44 28 L44 26 L36 26 L36 28 L32 28 Z"
          fill="white" opacity="0.8"/>
  </g>

  <!-- Text lockup -->
  <text x="104" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="32" font-weight="700" fill="#312e81" letter-spacing="-0.5">
    Elder Mind
  </text>
  <text x="104" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="400" fill="#4338ca" letter-spacing="0.5">
    Agentic Governance
  </text>
  <text x="104" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="400" fill="#6b7280" letter-spacing="0.3">
    by Cyber Elders
  </text>

  <!-- Maturity color bar accent line -->
  <rect x="104" y="100" width="200" height="3" rx="1.5" fill="url(#maturity-bar)"/>
</svg>
